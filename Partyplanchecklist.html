<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Japan Wedding Reception Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f5f2; color: #1a1a1a; padding: 2rem 1rem; }
  .app { max-width: 700px; margin: 0 auto; }
  .top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 12px; }
  .top-bar-text h1 { font-size: 19px; font-weight: 700; margin-bottom: 3px; }
  .top-bar-text .subtitle { font-size: 12px; color: #999; }
  .lang-toggle { display: flex; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .lang-btn { font-size: 12px; padding: 6px 13px; background: #fff; color: #888; cursor: pointer; border: none; outline: none; transition: background 0.15s, color 0.15s; }
  .lang-btn.active { background: #B07D3A; color: #fff; }
  .event-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; }
  .meta-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  .meta-input { font-size: 13px; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
  .meta-input:focus { border-color: #B07D3A; }
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-bar { height: 4px; background: #e5e5e5; border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
  .progress-fill { height: 100%; border-radius: 99px; background: #B07D3A; transition: width 0.3s ease; }
  .progress-text { font-size: 12px; color: #999; }
  .phase-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #B07D3A; margin: 1.4rem 0 6px 2px; }
  .section { margin-bottom: 6px; border: 1px solid #e8e5e0; border-radius: 12px; overflow: hidden; background: #fff; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #faf8f5; cursor: pointer; user-select: none; }
  .section-icon { font-size: 14px; width: 20px; text-align: center; }
  .section-name { font-size: 13px; font-weight: 600; color: #1a1a1a; flex: 1; }
  .section-count { font-size: 12px; color: #bbb; }
  .section-toggle { font-size: 10px; color: #ccc; }
  .section-body.collapsed { display: none; }
  .item-row { display: flex; align-items: flex-start; gap: 10px; padding: 7px 14px; border-bottom: 1px solid #f2ede8; }
  .item-row:last-of-type { border-bottom: none; }
  .item-row input[type=checkbox] { width: 14px; height: 14px; accent-color: #B07D3A; cursor: pointer; flex-shrink: 0; margin-top: 2px; }
  .item-label { font-size: 13px; color: #1a1a1a; flex: 1; line-height: 1.6; cursor: pointer; }
  .item-label.checked { color: #c0bbb4; text-decoration: line-through; }
  .add-item { display: flex; gap: 6px; padding: 7px 14px; border-top: 1px solid #f0ede8; }
  .add-input { flex: 1; font-size: 12px; padding: 5px 9px; border: 1px solid #ddd; border-radius: 7px; background: #fafafa; color: #1a1a1a; outline: none; }
  .add-input:focus { border-color: #B07D3A; background: #fff; }
  .add-btn { font-size: 12px; padding: 5px 10px; border: 1px solid #ddd; border-radius: 7px; background: #fff; color: #666; cursor: pointer; }
  .add-btn:hover { background: #f0f0f0; }
  .footer-actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
  .footer-btn { font-size: 12px; padding: 7px 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #555; cursor: pointer; }
  .footer-btn:hover { background: #f5f3f0; }
  .footer-btn.primary { background: #B07D3A; color: #fff; border-color: #B07D3A; }
  .footer-btn.primary:hover { background: #8C6230; }
  @media print {
    body { background: #fff; padding: 1rem; }
    .footer-actions, .add-item, .lang-toggle { display: none; }
    .section-body.collapsed { display: block !important; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="top-bar-text">
      <h1 id="title-text">Japan Wedding Reception Checklist</h1>
      <p class="subtitle" id="subtitle-text">Venue party in Japan — reusable master template</p>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-my" onclick="setLang('my')">မြန်မာ</button>
    </div>
  </div>

  <div class="event-meta">
    <div class="meta-field">
      <span class="meta-label" data-key="meta_couple">Couple</span>
      <input class="meta-input" placeholder="e.g. Ma Aye & Ko Kyaw" />
    </div>
    <div class="meta-field">
      <span class="meta-label" data-key="meta_date">Wedding Date</span>
      <input class="meta-input" type="date" />
    </div>
    <div class="meta-field">
      <span class="meta-label" data-key="meta_venue">Venue</span>
      <input class="meta-input" data-key-ph="ph_venue" placeholder="Venue name & location" />
    </div>
    <div class="meta-field">
      <span class="meta-label" data-key="meta_time">Reception Start Time</span>
      <input class="meta-input" data-key-ph="ph_time" placeholder="e.g. 6:00 PM" />
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text"></div>
  </div>

  <div id="sections"></div>

  <div class="footer-actions">
    <button class="footer-btn" onclick="expandAll()" data-key="btn_expand">Expand all</button>
    <button class="footer-btn" onclick="collapseAll()" data-key="btn_collapse">Collapse all</button>
    <button class="footer-btn" onclick="uncheckAll()" data-key="btn_reset">Reset all</button>
    <button class="footer-btn primary" onclick="window.print()" data-key="btn_print">Print / Save PDF</button>
  </div>
</div>

      my:["ပွဲစဉ်အချိန်ဇယား ဝန်ဆောင်မှုပေးသူအားလုံးသို့ ဖြန့်ဝေပြီး","ကြိုဆိုမိန့်ခွန်းနှင့် ချီးမွမ်းစကားများ ပြောပြီး","ပထမဆုံး အတူကခုန်မှု ပြီးဆုံးပြီး","ဓာတ်ပုံပြကွက် / ဗီဒီယို ဖွင့်ပြပြီး AV စစ်ဆေးပြီး","ဂိမ်းများ / ဖျော်ဖြေမှုများ စီစဉ်ထားသည့်အတိုင်း ပြုလုပ်ပြီး","ကိတ်မုန့်ဖြတ်မှု ပြုလုပ်ပြီး","နောက်ဆုံးကခုန်ချိန် / ပွဲဆုံးနှုတ်ဆက်ချိန် ပြုလုပ်ပြီး"]
    }
  },
  { id:"day_photo", phase:6, icon:"▣",
    name:{en:"Photography & videography", my:"ဓာတ်ပုံ / ဗီဒီယို"},
    items:{
      en:["Shot list shared with photographer before the day","Key moments covered (first look, Su Lyar Yit Pat, cake cut, speeches, first dance)","Photo booth / instant camera set up (if any)","Photographer & videographer wrap confirmed"],
      my:["ဓာတ်ပုံစာရင်း ပွဲမတိုင်မီ ဓာတ်ပုံဆရာသို့ မျှဝေပြီး","အဓိကအချိန်များ (ပထမတွေ့ဆုံမှု၊ စုလျာရစ်ပတ်၊ မုန့်ဖြတ်ခြင်း) မှတ်တမ်းတင်ပြီး","ဓာတ်ပုံဗုံး / ချက်ချင်းပုံ ကင်မရာ ပြင်ဆင်ပြီး (ရှိပါက)","ဓာတ်ပုံဆရာနှင့် ဗီဒီယိုဆရာ ထွက်ခွာမှု အတည်ပြုပြီး"]
    }
  },

  // ── PHASE 7 ─────────────────────────────────────────────
  { id:"after_wedding", phase:7, icon:"✦",
    name:{en:"After the wedding", my:"မင်္ဂလာဆောင်ပြီးနောက်"},
    items:{
      en:["Photos / videos delivered to couple","Wedding photo album ordered","Thank-you notes / letters sent to vendors","Thank-you notes sent to guests","Post-reception cleanup completed & venue handed back","Late-night accommodation for couple confirmed","Client review / testimonial requested (if applicable)"],
      my:["ဓာတ်ပုံ / ဗီဒီယိုများ သတို့တွဲကို ပေးအပ်ပြီး","မင်္ဂလာဆောင် ဓာတ်ပုံ အယ်လ်ဘမ် မှာပြီး","ကျေးဇူးတင်ကြောင်း စာများ ဝန်ဆောင်မှုပေးသူများသို့ ပေးပို့ပြီး","ကျေးဇူးတင်ကြောင်း စာများ ဧည့်သည်များသို့ ပေးပို့ပြီး","ပွဲပြီးနောက် သန့်ရှင်းရေး ပြုလုပ်ပြီး၊ နေရာ ပြန်လည်အပ်နှံပြီး","ပွဲပြီးနောက် သတို့တွဲ တည်းခိုရမည့်နေရာ အတည်ပြုပြီး","ဖောက်သည် သုံးသပ်ချက် / သက်သေခံချက် တောင်းခံပြီး (ရှိပါက)"]
    }
  },
];

// ─── STATE ────────────────────────────────────────────────
let currentLang = 'en';
let state = {}, collapsed = {}, customItems = {};
RAW.forEach(s => {
  state[s.id] = s.items.en.map(() => false);
  collapsed[s.id] = true;
  customItems[s.id] = [];
});

function allItems(sec, lang) { return [...sec.items[lang], ...customItems[sec.id]]; }

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.getElementById('btn-my').classList.toggle('active', lang==='my');
  const L = LANG[lang];
  document.getElementById('title-text').textContent = L.title;
  document.getElementById('subtitle-text').textContent = L.subtitle;
  document.querySelectorAll('[data-key]').forEach(el => { const k=el.getAttribute('data-key'); if(L[k]) el.textContent=L[k]; });
  document.querySelectorAll('[data-key-ph]').forEach(el => { const k=el.getAttribute('data-key-ph'); if(L[k]) el.placeholder=L[k]; });
  renderSections();
}

function updateProgress() {
  let total=0, checked=0;
  RAW.forEach(s => { state[s.id].forEach(v => { total++; if(v) checked++; }); });
  const pct = total ? Math.round(checked/total*100) : 0;
  document.getElementById("progress-fill").style.width = pct+"%";
  document.getElementById("progress-text").textContent = LANG[currentLang].progress(checked, total);
}

function renderSections() {
  const container = document.getElementById("sections");
  container.innerHTML = "";
  const L = LANG[currentLang];
  const pl = PHASE_LABELS[currentLang];
  let lastPhase = null;

  RAW.forEach(sec => {
    if (sec.phase !== lastPhase) {
      lastPhase = sec.phase;
      const ph = document.createElement("div");
      ph.className = "phase-header";
      ph.textContent = pl[sec.phase];
      container.appendChild(ph);
    }
    const items = allItems(sec, currentLang);
    const checkedCount = state[sec.id].filter(Boolean).length;
    const div = document.createElement("div"); div.className = "section";
    const header = document.createElement("div"); header.className = "section-header";
    header.innerHTML = `<span class="section-icon">${sec.icon}</span><span class="section-name">${sec.name[currentLang]}</span><span class="section-count" id="count-${sec.id}">${checkedCount}/${items.length}</span><span class="section-toggle">${collapsed[sec.id]?"▸":"▾"}</span>`;
    header.onclick = () => { collapsed[sec.id] = !collapsed[sec.id]; renderSections(); };
    const body = document.createElement("div");
    body.className = "section-body" + (collapsed[sec.id] ? " collapsed" : "");
    items.forEach((label, i) => {
      const row = document.createElement("div"); row.className = "item-row";
      const cbId = `cb-${sec.id}-${i}`;
      row.innerHTML = `<input type="checkbox" id="${cbId}" ${state[sec.id][i]?"checked":""} /><label class="item-label ${state[sec.id][i]?"checked":""}" for="${cbId}">${label}</label>`;
      row.querySelector("input").onchange = function() {
        state[sec.id][i] = this.checked;
        row.querySelector(".item-label").classList.toggle("checked", this.checked);
        document.getElementById("count-"+sec.id).textContent = state[sec.id].filter(Boolean).length+"/"+allItems(sec,currentLang).length;
        updateProgress();
      };
      body.appendChild(row);
    });
    const addRow = document.createElement("div"); addRow.className = "add-item";
    addRow.innerHTML = `<input class="add-input" placeholder="${L.add_placeholder}" /><button class="add-btn">${L.add_btn}</button>`;
    const inp = addRow.querySelector("input"), btn = addRow.querySelector("button");
    const doAdd = () => { const v=inp.value.trim(); if(!v) return; customItems[sec.id].push(v); state[sec.id].push(false); inp.value=""; renderSections(); updateProgress(); };
    btn.onclick = doAdd; inp.onkeydown = e => { if(e.key==="Enter") doAdd(); };
    body.appendChild(addRow);
    div.appendChild(header); div.appendChild(body); container.appendChild(div);
  });
  updateProgress();
}

function expandAll() { RAW.forEach(s => collapsed[s.id]=false); renderSections(); }
function collapseAll() { RAW.forEach(s => collapsed[s.id]=true); renderSections(); }
function uncheckAll() { RAW.forEach(s => { state[s.id]=state[s.id].map(()=>false); }); renderSections(); }

renderSections();
</script>
