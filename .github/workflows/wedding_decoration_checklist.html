<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decoration Checklist — Amore Wedding</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f5f2; color: #1a1a1a; padding: 2rem 1rem; }
  .app { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .event-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; }
  .meta-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; }
  .meta-input { font-size: 13px; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
  .meta-input:focus { border-color: #1D9E75; }
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-bar { height: 5px; background: #e5e5e5; border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; border-radius: 99px; background: #1D9E75; transition: width 0.3s ease; }
  .progress-text { font-size: 12px; color: #888; }
  .section { margin-bottom: 10px; border: 1px solid #e8e5e0; border-radius: 12px; overflow: hidden; background: #fff; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: #f9f7f4; cursor: pointer; user-select: none; }
  .section-icon { font-size: 15px; width: 22px; text-align: center; }
  .section-name { font-size: 13px; font-weight: 600; color: #1a1a1a; flex: 1; }
  .section-count { font-size: 12px; color: #aaa; }
  .section-toggle { font-size: 10px; color: #bbb; transition: transform 0.2s; }
  .section-body { }
  .section-body.collapsed { display: none; }
  .item-row { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid #f0ede8; }
  .item-row:last-of-type { border-bottom: none; }
  .item-row input[type=checkbox] { width: 15px; height: 15px; accent-color: #1D9E75; cursor: pointer; flex-shrink: 0; }
  .item-label { font-size: 13px; color: #1a1a1a; flex: 1; line-height: 1.5; cursor: pointer; }
  .item-label.checked { color: #bbb; text-decoration: line-through; }
  .add-item { display: flex; gap: 6px; padding: 8px 14px; border-top: 1px solid #f0ede8; }
  .add-input { flex: 1; font-size: 12px; padding: 6px 9px; border: 1px solid #ddd; border-radius: 7px; background: #fafafa; color: #1a1a1a; outline: none; }
  .add-input:focus { border-color: #1D9E75; background: #fff; }
  .add-btn { font-size: 12px; padding: 6px 12px; border: 1px solid #ddd; border-radius: 7px; background: #fff; color: #555; cursor: pointer; white-space: nowrap; }
  .add-btn:hover { background: #f0f0f0; }
  .footer-actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
  .footer-btn { font-size: 12px; padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #555; cursor: pointer; }
  .footer-btn:hover { background: #f0f0f0; }
  .footer-btn.primary { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .footer-btn.primary:hover { background: #0F6E56; }
  @media print {
    body { background: #fff; padding: 1rem; }
    .footer-actions, .add-item { display: none; }
    .section-body.collapsed { display: block !important; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>Decoration Preparation Checklist</h1>
  <p class="subtitle">Amore Wedding / The Studio Eternelle</p>

  <div class="event-meta">
    <div class="meta-field">
      <span class="meta-label">Couple / Wedding</span>
      <input class="meta-input" id="couple-name" placeholder="e.g. Thida & Kenji" />
    </div>
    <div class="meta-field">
      <span class="meta-label">Wedding Date</span>
      <input class="meta-input" type="date" id="wedding-date" />
    </div>
    <div class="meta-field">
      <span class="meta-label">Venue</span>
      <input class="meta-input" id="venue" placeholder="Venue name" />
    </div>
    <div class="meta-field">
      <span class="meta-label">Setup Time</span>
      <input class="meta-input" id="setup-time" placeholder="e.g. 8:00 AM" />
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">0 of 0 items checked</div>
  </div>

  <div id="sections"></div>

  <div class="footer-actions">
    <button class="footer-btn" onclick="expandAll()">Expand all</button>
    <button class="footer-btn" onclick="collapseAll()">Collapse all</button>
    <button class="footer-btn" onclick="uncheckAll()">Reset all</button>
    <button class="footer-btn primary" onclick="window.print()">Print / Save PDF</button>
  </div>
</div>

<script>
const SECTIONS = [
  {
    id: "florals", icon: "✿", name: "Florals & greenery",
    items: [
      "Ceremony arch / backdrop flowers",
      "Altar / main table centerpiece",
      "Guest table flower centerpieces",
      "Aisle petal / flower markers",
      "Boutonnieres",
      "Loose petals / scattered flowers",
      "Greenery garlands"
    ]
  },
  {
    id: "lighting", icon: "◎", name: "Lighting & ambiance",
    items: [
      "Fairy lights / string lights",
      "Candles (pillar / taper / tealight)",
      "Candle holders & votives",
      "Lanterns",
      "LED battery-powered lights",
      "Neon sign / marquee letters"
    ]
  },
  {
    id: "table", icon: "▭", name: "Table decor",
    items: [
      "Table runners",
      "Tablecloths / overlays",
      "Charger plates",
      "Napkins & napkin rings",
      "Place cards / name cards",
      "Menu cards",
      "Table numbers & stands",
      "Vases & vessels",
      "Candelabras"
    ]
  },
  {
    id: "ceremony", icon: "◇", name: "Ceremony decor",
    items: [
      "Arch / floral backdrop frame",
      "Aisle runner",
      "Chair sashes / ribbons",
      "Aisle markers (cones, hooks, lanterns)",
      "Ring pillow",
      "Flower girl basket",
      "Ceremony signage (welcome, order of events)"
    ]
  },
  {
    id: "signage", icon: "▤", name: "Signage & stationery",
    items: [
      "Welcome sign & easel",
      "Seating chart / escort display",
      "Bar menu sign",
      "Photo booth props & frame",
      "Guest book & pen",
      "Wishing well / gift box"
    ]
  },
  {
    id: "backdrop", icon: "◫", name: "Backdrops & structures",
    items: [
      "Ceremony backdrop frame / stand",
      "Photo booth backdrop",
      "Balloon arch / balloon clusters",
      "Draping fabric / curtain panels",
      "Pipe & drape stands"
    ]
  },
  {
    id: "tools", icon: "⚙", name: "Setup tools & supplies",
    items: [
      "Scissors (multiple pairs)",
      "Floral wire & wire cutters",
      "Zip ties (assorted sizes)",
      "Cable ties / velcro strips",
      "Fishing line / clear thread",
      "Hot glue gun & extra glue sticks",
      "Tape — double-sided, masking, gaffer",
      "Command strips / adhesive hooks",
      "Safety pins",
      "Measuring tape",
      "Rubber bands",
      "Zip-lock bags (for small items)",
      "Permanent marker / chalk pen",
      "Extension cord / power strip",
      "Steamer / iron for fabric",
      "Ladder / step stool",
      "Plastic dropcloths / floor protection",
      "Cleaning cloth / towel"
    ]
  },
  {
    id: "transport", icon: "▲", name: "Transport & packing",
    items: [
      "Packing boxes (labelled by section)",
      "Bubble wrap / tissue paper",
      "Moving blankets for fragile items",
      "Trolley / cart for heavy boxes",
      "Cooler / water mist spray for flowers",
      "Checklist confirming all items loaded"
    ]
  },
  {
    id: "breakdown", icon: "↺", name: "Post-wedding breakdown",
    items: [
      "Collection boxes / bags ready",
      "Rental items labelled for return",
      "Dispose of floral waste",
      "Collect all signage & props",
      "Retrieve extension cords & tools",
      "Final walkthrough — check venue for left-behind items"
    ]
  }
];

let state = {};
let collapsed = {};
let customItems = {};

SECTIONS.forEach(s => {
  state[s.id] = s.items.map(() => false);
  collapsed[s.id] = false;
  customItems[s.id] = [];
});

function allItems(sec) {
  return [...sec.items, ...customItems[sec.id]];
}

function updateProgress() {
  let total = 0, checked = 0;
  SECTIONS.forEach(s => {
    state[s.id].forEach(v => { total++; if (v) checked++; });
  });
  const pct = total ? Math.round(checked / total * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").textContent = checked + " of " + total + " items checked";
}

function renderSections() {
  const container = document.getElementById("sections");
  container.innerHTML = "";

  SECTIONS.forEach(sec => {
    const items = allItems(sec);
    const checkedCount = state[sec.id].filter(Boolean).length;

    const div = document.createElement("div");
    div.className = "section";

    const header = document.createElement("div");
    header.className = "section-header";
    header.innerHTML = `
      <span class="section-icon">${sec.icon}</span>
      <span class="section-name">${sec.name}</span>
      <span class="section-count" id="count-${sec.id}">${checkedCount}/${items.length}</span>
      <span class="section-toggle">${collapsed[sec.id] ? "▸" : "▾"}</span>
    `;
    header.onclick = () => { collapsed[sec.id] = !collapsed[sec.id]; renderSections(); };

    const body = document.createElement("div");
    body.className = "section-body" + (collapsed[sec.id] ? " collapsed" : "");

    items.forEach((label, i) => {
      const row = document.createElement("div");
      row.className = "item-row";
      const cbId = `cb-${sec.id}-${i}`;
      row.innerHTML = `<input type="checkbox" id="${cbId}" ${state[sec.id][i] ? "checked" : ""} />
        <label class="item-label ${state[sec.id][i] ? "checked" : ""}" for="${cbId}">${label}</label>`;
      row.querySelector("input").onchange = function() {
        state[sec.id][i] = this.checked;
        row.querySelector(".item-label").classList.toggle("checked", this.checked);
        const c = state[sec.id].filter(Boolean).length;
        document.getElementById("count-" + sec.id).textContent = c + "/" + items.length;
        updateProgress();
      };
      body.appendChild(row);
    });

    const addRow = document.createElement("div");
    addRow.className = "add-item";
    addRow.innerHTML = `<input class="add-input" placeholder="Add custom item..." /><button class="add-btn">+ Add</button>`;
    const inp = addRow.querySelector("input");
    const btn = addRow.querySelector("button");
    const doAdd = () => {
      const v = inp.value.trim();
      if (!v) return;
      customItems[sec.id].push(v);
      state[sec.id].push(false);
      inp.value = "";
      renderSections();
      updateProgress();
    };
    btn.onclick = doAdd;
    inp.onkeydown = e => { if (e.key === "Enter") doAdd(); };
    body.appendChild(addRow);

    div.appendChild(header);
    div.appendChild(body);
    container.appendChild(div);
  });

  updateProgress();
}

function expandAll() { SECTIONS.forEach(s => collapsed[s.id] = false); renderSections(); }
function collapseAll() { SECTIONS.forEach(s => collapsed[s.id] = true); renderSections(); }
function uncheckAll() {
  SECTIONS.forEach(s => { state[s.id] = state[s.id].map(() => false); });
  renderSections();
}

renderSections();
</script>
</body>
</html>
