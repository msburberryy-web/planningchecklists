<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monastery Wedding Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f5f2; color: #1a1a1a; padding: 2rem 1rem; }
  .app { max-width: 680px; margin: 0 auto; }
  .top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 12px; }
  .top-bar-text h1 { font-size: 19px; font-weight: 600; margin-bottom: 3px; }
  .top-bar-text .subtitle { font-size: 12px; color: #999; }
  .lang-toggle { display: flex; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .lang-btn { font-size: 12px; padding: 6px 13px; background: #fff; color: #888; cursor: pointer; border: none; outline: none; transition: background 0.15s, color 0.15s; }
  .lang-btn.active { background: #B07D3A; color: #fff; }
  .event-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; }
  .meta-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  .meta-input { font-size: 13px; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
  .meta-input:focus { border-color: #B07D3A; }
  .progress-wrap { margin-bottom: 1.25rem; }
  .progress-bar { height: 4px; background: #e5e5e5; border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
  .progress-fill { height: 100%; border-radius: 99px; background: #B07D3A; transition: width 0.3s ease; }
  .progress-text { font-size: 12px; color: #999; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
  .filter-row-label { font-size: 11px; color: #bbb; text-transform: uppercase; letter-spacing: 0.05em; min-width: 44px; }
  .filter-btn { font-size: 12px; padding: 5px 13px; border: 1px solid #ddd; border-radius: 20px; background: #fff; color: #666; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { background: #f5f3f0; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .filter-btn.active-amore { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .filter-btn.active-client { background: #5B8DD9; color: #fff; border-color: #5B8DD9; }
  .section { margin-bottom: 8px; border: 1px solid #e8e5e0; border-radius: 12px; overflow: hidden; background: #fff; }
  .section.empty-section { display: none; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #faf8f5; cursor: pointer; user-select: none; }
  .section-icon { font-size: 14px; width: 20px; text-align: center; }
  .section-name { font-size: 13px; font-weight: 600; color: #1a1a1a; flex: 1; }
  .section-count { font-size: 12px; color: #bbb; }
  .section-toggle { font-size: 10px; color: #ccc; }
  .section-body.collapsed { display: none; }
  .item-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 14px; border-bottom: 1px solid #f2ede8; }
  .item-row:last-of-type { border-bottom: none; }
  .item-row.hidden { display: none; }
  .item-row input[type=checkbox] { width: 14px; height: 14px; accent-color: #B07D3A; cursor: pointer; flex-shrink: 0; margin-top: 4px; }
  .item-label { font-size: 13px; color: #1a1a1a; flex: 1; line-height: 1.6; cursor: text; border-radius: 4px; padding: 1px 4px; margin: 0 -4px; outline: none; min-width: 0; word-break: break-word; transition: background 0.1s; }
  .item-label:hover { background: #f5f3f0; }
  .item-label:focus { background: #fff; box-shadow: 0 0 0 2px #B07D3A44; }
  .item-label.checked { color: #c0bbb4; text-decoration: line-through; }
  .item-label.na { color: #c8c0b8; text-decoration: line-through; font-style: italic; }
  .item-label[contenteditable=true]:empty:before { content: attr(data-placeholder); color: #ccc; font-style: italic; }
  .owner-btn { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; border: 1px solid #ddd; cursor: pointer; flex-shrink: 0; margin-top: 4px; transition: all 0.15s; white-space: nowrap; background: #fff; color: #bbb; letter-spacing: 0.02em; }
  .owner-btn.amore { background: #e8f7f2; border-color: #1D9E75; color: #0F6E56; }
  .owner-btn.client { background: #e8f0fc; border-color: #5B8DD9; color: #2c5fb3; }
  .na-btn { font-size: 10px; padding: 2px 7px; border-radius: 10px; border: 1px solid #ddd; background: #fff; color: #aaa; cursor: pointer; flex-shrink: 0; margin-top: 4px; white-space: nowrap; transition: all 0.15s; }
  .na-btn:hover { background: #f5f0ea; }
  .na-btn.active { background: #f0e8da; border-color: #C8975A; color: #8C6230; }
  .del-btn { font-size: 13px; padding: 0 3px; background: none; border: none; color: #ddd; cursor: pointer; flex-shrink: 0; margin-top: 3px; line-height: 1; transition: color 0.15s; }
  .del-btn:hover { color: #e05555; }
  .item-row:not(:hover) .del-btn { opacity: 0; pointer-events: none; }
  .add-item { display: flex; gap: 6px; padding: 7px 14px; border-top: 1px solid #f0ede8; }
  .add-input { flex: 1; font-size: 12px; padding: 5px 9px; border: 1px solid #ddd; border-radius: 7px; background: #fafafa; color: #1a1a1a; outline: none; }
  .add-input:focus { border-color: #B07D3A; background: #fff; }
  .add-btn-el { font-size: 12px; padding: 5px 10px; border: 1px solid #ddd; border-radius: 7px; background: #fff; color: #666; cursor: pointer; }
  .add-btn-el:hover { background: #f0f0f0; }
  .footer-actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
  .footer-btn { font-size: 12px; padding: 7px 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #555; cursor: pointer; }
  .footer-btn:hover { background: #f5f3f0; }
  .footer-btn.primary { background: #B07D3A; color: #fff; border-color: #B07D3A; }
  .footer-btn.primary:hover { background: #8C6230; }
  .footer-btn.success { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .footer-btn.success:hover { background: #0F6E56; }
  .footer-btn.info { background: #5B8DD9; color: #fff; border-color: #5B8DD9; }
  .footer-btn.info:hover { background: #2c5fb3; }
  #img-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:10px; }
  #img-overlay.show { display:flex; }
  #img-overlay p { color:#fff; font-size:13px; }
  #img-overlay .spinner { width:28px;height:28px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @media print {
    body { background:#fff; padding:1rem; }
    .footer-actions,.add-item,.lang-toggle,.filter-row,.na-btn,.del-btn { display:none !important; }
    .section-body.collapsed { display:block !important; }
    .item-row.hidden { display:none !important; }
    .section.empty-section { display:none !important; }
    .owner-btn { border:1px solid #ddd !important; }
    .item-label { padding:0; background:none !important; box-shadow:none !important; }
  }
</style>
</head>
<body>
<div class="app" id="main-app">
  <div class="top-bar">
    <div class="top-bar-text">
      <h1 id="title-text">Monastery Wedding Checklist</h1>
      <p class="subtitle" id="subtitle-text">Myanmar Buddhist tradition — reusable master template</p>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-my" onclick="setLang('my')">မြန်မာ</button>
    </div>
  </div>
  <div class="event-meta">
    <div class="meta-field"><span class="meta-label" data-key="meta_couple">Couple</span><input class="meta-input" id="meta-couple" placeholder="e.g. Ma Aye & Ko Kyaw" /></div>
    <div class="meta-field"><span class="meta-label" data-key="meta_date">Wedding Date</span><input class="meta-input" id="meta-date" type="date" /></div>
    <div class="meta-field"><span class="meta-label" data-key="meta_monastery">Monastery</span><input class="meta-input" id="meta-monastery" data-key-ph="ph_monastery" placeholder="Monastery name" /></div>
    <div class="meta-field"><span class="meta-label" data-key="meta_soon">Alms time (Mingalar Soon)</span><input class="meta-input" id="meta-soon" data-key-ph="ph_soon" placeholder="e.g. 10:00 AM" /></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text"></div>
  </div>
  <div class="filter-row">
    <span class="filter-row-label" id="label-status">Status</span>
    <button class="filter-btn active" id="filter-all"     onclick="setFilter('status','all')"     data-key="filter_all">All</button>
    <button class="filter-btn"        id="filter-pending" onclick="setFilter('status','pending')" data-key="filter_pending">Pending</button>
    <button class="filter-btn"        id="filter-done"    onclick="setFilter('status','done')"    data-key="filter_done">Done</button>
    <button class="filter-btn"        id="filter-na"      onclick="setFilter('status','na')"      data-key="filter_na">N/A</button>
  </div>
  <div class="filter-row" style="margin-bottom:1rem;">
    <span class="filter-row-label" id="label-owner">Owner</span>
    <button class="filter-btn active" id="filter-owner-all"    onclick="setFilter('owner','all')"    data-key="filter_owner_all">All</button>
    <button class="filter-btn"        id="filter-owner-amore"  onclick="setFilter('owner','amore')"  data-key="filter_owner_amore">Amore</button>
    <button class="filter-btn"        id="filter-owner-client" onclick="setFilter('owner','client')" data-key="filter_owner_client">Client</button>
    <button class="filter-btn"        id="filter-owner-unset"  onclick="setFilter('owner','unset')"  data-key="filter_owner_unset">Unassigned</button>
  </div>
  <div id="sections"></div>
  <div class="footer-actions">
    <button class="footer-btn" onclick="expandAll()"   data-key="btn_expand">Expand all</button>
    <button class="footer-btn" onclick="collapseAll()" data-key="btn_collapse">Collapse all</button>
    <button class="footer-btn" onclick="uncheckAll()"  data-key="btn_reset">Reset all</button>
    <button class="footer-btn primary" onclick="window.print()"  data-key="btn_print">Print / PDF</button>
    <button class="footer-btn success" onclick="downloadHTML()"  data-key="btn_html">↓ HTML</button>
    <button class="footer-btn info"    onclick="downloadImage()" data-key="btn_image">↓ Image</button>
  </div>
</div>
<div id="img-overlay"><div class="spinner"></div><p id="overlay-msg">Generating image…</p></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

// ─── STATE ──────────────────────────────────────────────────────────────────
let currentLang='en', statusFilter='all', ownerFilter='all';
let checkedState={}, naState={}, ownerState={}, labelState={}, collapsed={}, customItems={};

function initState(){
  SECTIONS_DATA.forEach(s=>{
    checkedState[s.id] = s.items.map(()=>false);
    naState[s.id]      = s.items.map(()=>false);
    ownerState[s.id]   = s.items.map(i=>i.o||null);
    labelState[s.id]   = s.items.map(i=>({en:i.t.en,my:i.t.my}));
    collapsed[s.id]    = false;
    customItems[s.id]  = [];
  });
}
initState();

// ─── SNAPSHOT RESTORE (injected by downloadHTML) ────────────────────────────
if(typeof __SNAPSHOT__!=='undefined'){
  const S=__SNAPSHOT__;
  currentLang=S.lang; statusFilter=S.statusFilter; ownerFilter=S.ownerFilter;
  // Deep copy to avoid reference issues
  SECTIONS_DATA.forEach(s=>{
    if(S.checkedState[s.id]) checkedState[s.id]=S.checkedState[s.id].slice();
    if(S.naState[s.id])      naState[s.id]=S.naState[s.id].slice();
    if(S.ownerState[s.id])   ownerState[s.id]=S.ownerState[s.id].slice();
    if(S.labelState[s.id])   labelState[s.id]=S.labelState[s.id].map(x=>({...x}));
    if(S.customItems[s.id])  customItems[s.id]=S.customItems[s.id].map(x=>({...x}));
    if(S.collapsed)          collapsed[s.id]=S.collapsed[s.id];
  });
  // Restore meta inputs after DOM ready
  window.addEventListener('DOMContentLoaded',function(){
    document.getElementById('meta-couple').value    = S.meta.couple    ||'';
    document.getElementById('meta-date').value      = S.meta.date      ||'';
    document.getElementById('meta-monastery').value = S.meta.monastery ||'';
    document.getElementById('meta-soon').value      = S.meta.soon      ||'';
    setLang(S.lang);
    setFilter('status',S.statusFilter);
    setFilter('owner',S.ownerFilter);
  });
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function totalItems(id){ return labelState[id].length+customItems[id].length; }
function getLabel(id,i){
  const t=labelState[id].length;
  return i<t?(labelState[id][i][currentLang]||labelState[id][i].en):(customItems[id][i-t][currentLang]||customItems[id][i-t].en);
}
function setLabel(id,i,text){
  const t=labelState[id].length;
  if(i<t) labelState[id][i][currentLang]=text;
  else customItems[id][i-t][currentLang]=text;
}

function setFilter(type,val){
  if(type==='status'){ statusFilter=val; ['all','pending','done','na'].forEach(x=>{ const el=document.getElementById('filter-'+x); if(el) el.className='filter-btn'+(x===val?' active':''); }); }
  else{ ownerFilter=val; ['all','amore','client','unset'].forEach(x=>{ const el=document.getElementById('filter-owner-'+x); if(!el)return; let c='filter-btn'; if(x===val) c+=x==='amore'?' active-amore':x==='client'?' active-client':' active'; el.className=c; }); }
  applyFilter();
}
function itemVisible(id,i){
  const ck=checkedState[id][i],na=naState[id][i],ow=ownerState[id][i];
  const s=statusFilter==='all'||(statusFilter==='pending'&&!ck&&!na)||(statusFilter==='done'&&ck&&!na)||(statusFilter==='na'&&na);
  const o=ownerFilter==='all'||(ownerFilter==='amore'&&ow==='amore')||(ownerFilter==='client'&&ow==='client')||(ownerFilter==='unset'&&!ow);
  return s&&o;
}
function applyFilter(){
  document.querySelectorAll('.section').forEach(el=>{
    const id=el.getAttribute('data-id'); let v=0;
    el.querySelectorAll('.item-row[data-idx]').forEach(r=>{ const show=itemVisible(id,parseInt(r.getAttribute('data-idx'))); r.classList.toggle('hidden',!show); if(show)v++; });
    const ar=el.querySelector('.add-item'); if(ar) ar.style.display=(statusFilter==='all'&&ownerFilter==='all')?'':'none';
    el.classList.toggle('empty-section',v===0);
  });
}
function updateProgress(){
  let total=0,checked=0,na=0;
  SECTIONS_DATA.forEach(s=>{ checkedState[s.id].forEach((v,i)=>{ if(naState[s.id][i]){na++;return;} total++; if(v)checked++; }); });
  const pct=total?Math.round(checked/total*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=LANG[currentLang].progress(checked,total,na);
}
function refreshCount(id){
  const n=totalItems(id),nc=naState[id].filter(Boolean).length,cc=checkedState[id].filter((v,i)=>v&&!naState[id][i]).length;
  const el=document.getElementById('count-'+id);
  if(el) el.innerHTML=`${cc}/${n-nc}${nc?` <span style="color:#C8975A;font-size:11px">· ${nc} N/A</span>`:''}`;
}
function cycleOwner(id,i){
  const cur=ownerState[id][i]; ownerState[id][i]=cur===null?'amore':cur==='amore'?'client':null;
  const btn=document.querySelector(`.owner-btn[data-sec="${id}"][data-idx="${i}"]`);
  if(btn){ const o=ownerState[id][i],L=LANG[currentLang]; btn.className='owner-btn'+(o==='amore'?' amore':o==='client'?' client':''); btn.textContent=o==='amore'?L.amore_label:o==='client'?L.client_label:'—'; }
  applyFilter();
}
function deleteItem(id,i){
  checkedState[id].splice(i,1); naState[id].splice(i,1); ownerState[id].splice(i,1);
  const t=labelState[id].length;
  if(i<t){ labelState[id].splice(i,1); const sec=SECTIONS_DATA.find(s=>s.id===id); if(sec) sec.items.splice(i,1); }
  else customItems[id].splice(i-t,1);
  renderSections(); updateProgress();
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function renderSections(){
  const container=document.getElementById('sections'); container.innerHTML='';
  const L=LANG[currentLang];
  SECTIONS_DATA.forEach(sec=>{
    const n=totalItems(sec.id),nc=naState[sec.id].filter(Boolean).length,cc=checkedState[sec.id].filter((v,i)=>v&&!naState[sec.id][i]).length;
    const div=document.createElement('div'); div.className='section'; div.setAttribute('data-id',sec.id);
    const hdr=document.createElement('div'); hdr.className='section-header';
    hdr.innerHTML=`<span class="section-icon">${sec.icon}</span><span class="section-name">${sec.name[currentLang]||sec.name.en}</span><span class="section-count" id="count-${sec.id}">${cc}/${n-nc}${nc?` <span style="color:#C8975A;font-size:11px">· ${nc} N/A</span>`:''}</span><span class="section-toggle">${collapsed[sec.id]?'▸':'▾'}</span>`;
    hdr.onclick=()=>{ collapsed[sec.id]=!collapsed[sec.id]; renderSections(); };
    const body=document.createElement('div'); body.className='section-body'+(collapsed[sec.id]?' collapsed':'');
    for(let i=0;i<n;i++){
      const label=getLabel(sec.id,i),ck=checkedState[sec.id][i],na=naState[sec.id][i],ow=ownerState[sec.id][i];
      const row=document.createElement('div'); row.className='item-row'; row.setAttribute('data-idx',i);
      const cbId=`cb-${sec.id}-${i}`;
      const cb=document.createElement('input'); cb.type='checkbox'; cb.id=cbId; cb.checked=ck&&!na; cb.disabled=na;
      const lbl=document.createElement('label'); lbl.className='item-label'+(na?' na':ck?' checked':''); lbl.setAttribute('for',cbId); lbl.setAttribute('contenteditable','true'); lbl.setAttribute('data-placeholder',L.edit_placeholder); lbl.setAttribute('spellcheck','false'); lbl.textContent=label;
      const ob=document.createElement('button'); ob.className='owner-btn'+(ow==='amore'?' amore':ow==='client'?' client':''); ob.setAttribute('data-sec',sec.id); ob.setAttribute('data-idx',i); ob.textContent=ow==='amore'?L.amore_label:ow==='client'?L.client_label:'—';
      const nb=document.createElement('button'); nb.className='na-btn'+(na?' active':''); nb.textContent=L.na_label;
      const db=document.createElement('button'); db.className='del-btn'; db.textContent='×'; db.title='Remove item';
      cb.onchange=function(){ if(naState[sec.id][i])return; checkedState[sec.id][i]=this.checked; lbl.className='item-label'+(this.checked?' checked':''); refreshCount(sec.id); updateProgress(); applyFilter(); };
      lbl.oninput=function(){ setLabel(sec.id,i,this.textContent); };
      lbl.onkeydown=function(e){ if(e.key==='Enter'){e.preventDefault();this.blur();} };
      lbl.onclick=function(e){ e.preventDefault(); this.focus(); };
      ob.onclick=e=>{ e.stopPropagation(); cycleOwner(sec.id,i); };
      nb.onclick=()=>{ naState[sec.id][i]=!naState[sec.id][i]; if(naState[sec.id][i]) checkedState[sec.id][i]=false; renderSections(); updateProgress(); };
      db.onclick=e=>{ e.stopPropagation(); deleteItem(sec.id,i); };
      row.appendChild(cb); row.appendChild(lbl); row.appendChild(ob); row.appendChild(nb); row.appendChild(db);
      body.appendChild(row);
    }
    const ar=document.createElement('div'); ar.className='add-item';
    ar.innerHTML=`<input class="add-input" placeholder="${L.add_placeholder}"/><button class="add-btn-el">${L.add_btn}</button>`;
    const inp=ar.querySelector('input'),btn=ar.querySelector('button');
    const doAdd=()=>{ const v=inp.value.trim(); if(!v)return; customItems[sec.id].push({en:v,my:v}); checkedState[sec.id].push(false); naState[sec.id].push(false); ownerState[sec.id].push(null); inp.value=''; renderSections(); updateProgress(); };
    btn.onclick=doAdd; inp.onkeydown=e=>{ if(e.key==='Enter')doAdd(); };
    body.appendChild(ar); div.appendChild(hdr); div.appendChild(body); container.appendChild(div);
  });
  updateProgress(); applyFilter();
}

function setLang(lang){
  currentLang=lang;
  document.getElementById('btn-en').classList.toggle('active',lang==='en');
  document.getElementById('btn-my').classList.toggle('active',lang==='my');
  const L=LANG[lang];
  document.getElementById('title-text').textContent=L.title;
  document.getElementById('subtitle-text').textContent=L.subtitle;
  document.getElementById('label-status').textContent=L.label_status;
  document.getElementById('label-owner').textContent=L.label_owner;
  document.querySelectorAll('[data-key]').forEach(el=>{ const k=el.getAttribute('data-key'); if(L[k]!==undefined)el.textContent=L[k]; });
  document.querySelectorAll('[data-key-ph]').forEach(el=>{ const k=el.getAttribute('data-key-ph'); if(L[k])el.placeholder=L[k]; });
  renderSections();
}
function expandAll(){ SECTIONS_DATA.forEach(s=>collapsed[s.id]=false); renderSections(); }
function collapseAll(){ SECTIONS_DATA.forEach(s=>collapsed[s.id]=true); renderSections(); }
function uncheckAll(){ SECTIONS_DATA.forEach(s=>{ checkedState[s.id]=checkedState[s.id].map(()=>false); naState[s.id]=naState[s.id].map(()=>false); }); renderSections(); }

// ─── HTML DOWNLOAD ───────────────────────────────────────────────────────────
// Collect current label text from contenteditable DOM before serializing,
// since oninput may not fire for every character in all browsers.
function syncLabelsFromDOM(){
  SECTIONS_DATA.forEach(sec=>{
    const n=totalItems(sec.id);
    for(let i=0;i<n;i++){
      const lbl=document.querySelector(`[data-id="${sec.id}"] .item-row[data-idx="${i}"] .item-label`);
      if(lbl) setLabel(sec.id,i,lbl.textContent);
    }
  });
}

function downloadHTML(){
  syncLabelsFromDOM();
  const meta={
    couple:   document.getElementById('meta-couple').value,
    date:     document.getElementById('meta-date').value,
    monastery:document.getElementById('meta-monastery').value,
    soon:     document.getElementById('meta-soon').value,
  };
  // Serialize all JS state — NOT the DOM
  const snapshot={
    lang:currentLang, statusFilter, ownerFilter, meta,
    checkedState:  JSON.parse(JSON.stringify(checkedState)),
    naState:       JSON.parse(JSON.stringify(naState)),
    ownerState:    JSON.parse(JSON.stringify(ownerState)),
    labelState:    JSON.parse(JSON.stringify(labelState)),
    customItems:   JSON.parse(JSON.stringify(customItems)),
    collapsed:     JSON.parse(JSON.stringify(collapsed)),
  };
  // Build the script block that this file uses, then inject snapshot as a
  // variable declaration right at the top so the restore block runs on load.
  const snapshotDecl = `const __SNAPSHOT__ = ${JSON.stringify(snapshot)};\n`;
  // Get the current script content and prepend the snapshot declaration
  const scripts = document.querySelectorAll('script:not([src])');
  let mainScript = '';
  scripts.forEach(s=>{ if(s.textContent.includes('PAGE_TEMPLATE')) mainScript=s.textContent; });
  const injectedScript = snapshotDecl + mainScript;
  // Replace %%MAIN_SCRIPT%% placeholder in the template with injected script
  const finalHTML = PAGE_TEMPLATE.replace('%%MAIN_SCRIPT%%', injectedScript);
  const couple=(meta.couple||'checklist').replace(/[^a-zA-Z0-9]/g,'_');
  const date=meta.date||new Date().toISOString().slice(0,10);
  triggerDownload(new Blob([finalHTML],{type:'text/html;charset=utf-8'}), `wedding_checklist_${couple}_${date}.html`);
}

// ─── IMAGE DOWNLOAD ──────────────────────────────────────────────────────────
async function downloadImage(){
  const prevCollapsed={...collapsed};
  const prevStatus=statusFilter, prevOwner=ownerFilter;
  SECTIONS_DATA.forEach(s=>collapsed[s.id]=false);
  statusFilter='all'; ownerFilter='all';
  renderSections();
  const overlay=document.getElementById('img-overlay'),msg=document.getElementById('overlay-msg');
  overlay.classList.add('show'); msg.textContent='Preparing layout…';
  await new Promise(r=>setTimeout(r,150));
  msg.textContent='Capturing image…';
  const app=document.getElementById('main-app');
  try{
    const canvas=await html2canvas(app,{scale:2,useCORS:true,backgroundColor:'#f7f5f2',scrollY:-window.scrollY,
      onclone:function(doc){
        doc.querySelectorAll('.footer-actions,.filter-row,.add-item,.del-btn,.na-btn,.lang-toggle').forEach(el=>el.style.display='none');
        doc.querySelectorAll('.section-body.collapsed').forEach(el=>el.style.display='block');
        doc.querySelectorAll('.item-row.hidden').forEach(el=>el.style.display='flex');
        doc.querySelectorAll('.item-label').forEach(el=>{ el.style.background='none'; el.style.boxShadow='none'; });
      }
    });
    msg.textContent='Saving…';
    canvas.toBlob(blob=>{
      const couple=(document.getElementById('meta-couple').value||'checklist').replace(/[^a-zA-Z0-9]/g,'_');
      const date=document.getElementById('meta-date').value||new Date().toISOString().slice(0,10);
      triggerDownload(blob,`wedding_checklist_${couple}_${date}.png`);
    },'image/png');
  } catch(e){ alert('Image generation failed: '+e.message); }
  Object.assign(collapsed,prevCollapsed); statusFilter=prevStatus; ownerFilter=prevOwner;
  renderSections(); overlay.classList.remove('show');
}

function triggerDownload(blob,filename){
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),5000);
}

renderSections();
</script>
