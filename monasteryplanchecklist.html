<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monastery Wedding Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f5f2; color: #1a1a1a; padding: 2rem 1rem; }
  .app { max-width: 680px; margin: 0 auto; }

  .top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 12px; }
  .top-bar-text h1 { font-size: 19px; font-weight: 600; margin-bottom: 3px; }
  .top-bar-text .subtitle { font-size: 12px; color: #999; }
  .lang-toggle { display: flex; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .lang-btn { font-size: 12px; padding: 6px 13px; background: #fff; color: #888; cursor: pointer; border: none; outline: none; transition: background 0.15s, color 0.15s; }
  .lang-btn.active { background: #B07D3A; color: #fff; }

  .event-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; }
  .meta-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  .meta-input { font-size: 13px; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
  .meta-input:focus { border-color: #B07D3A; }

  .progress-wrap { margin-bottom: 1.25rem; }
  .progress-bar { height: 4px; background: #e5e5e5; border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
  .progress-fill { height: 100%; border-radius: 99px; background: #B07D3A; transition: width 0.3s ease; }
  .progress-text { font-size: 12px; color: #999; }

  .filter-row { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
  .filter-row-label { font-size: 11px; color: #bbb; text-transform: uppercase; letter-spacing: 0.05em; min-width: 44px; }
  .filter-btn { font-size: 12px; padding: 5px 13px; border: 1px solid #ddd; border-radius: 20px; background: #fff; color: #666; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { background: #f5f3f0; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .filter-btn.active-amore { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .filter-btn.active-client { background: #5B8DD9; color: #fff; border-color: #5B8DD9; }

  .section { margin-bottom: 8px; border: 1px solid #e8e5e0; border-radius: 12px; overflow: hidden; background: #fff; }
  .section.empty-section { display: none; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #faf8f5; cursor: pointer; user-select: none; }
  .section-icon { font-size: 14px; width: 20px; text-align: center; }
  .section-name { font-size: 13px; font-weight: 600; color: #1a1a1a; flex: 1; }
  .section-count { font-size: 12px; color: #bbb; }
  .section-toggle { font-size: 10px; color: #ccc; }
  .section-body.collapsed { display: none; }

  .item-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 14px; border-bottom: 1px solid #f2ede8; }
  .item-row:last-of-type { border-bottom: none; }
  .item-row.hidden { display: none; }

  .item-row input[type=checkbox] { width: 14px; height: 14px; accent-color: #B07D3A; cursor: pointer; flex-shrink: 0; margin-top: 4px; }

  /* Editable label */
  .item-label {
    font-size: 13px; color: #1a1a1a; flex: 1; line-height: 1.6;
    cursor: text; border-radius: 4px; padding: 1px 4px; margin: 0 -4px;
    outline: none; min-width: 0; word-break: break-word;
    transition: background 0.1s;
  }
  .item-label:hover { background: #f5f3f0; }
  .item-label:focus { background: #fff; box-shadow: 0 0 0 2px #B07D3A44; cursor: text; }
  .item-label.checked { color: #c0bbb4; text-decoration: line-through; }
  .item-label.checked:hover { background: #f5f3f0; }
  .item-label.na { color: #c8c0b8; text-decoration: line-through; font-style: italic; }
  .item-label[contenteditable=true]:empty:before { content: attr(data-placeholder); color: #ccc; font-style: italic; }

  .owner-btn { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; border: 1px solid #ddd; cursor: pointer; flex-shrink: 0; margin-top: 4px; transition: all 0.15s; white-space: nowrap; background: #fff; color: #bbb; letter-spacing: 0.02em; }
  .owner-btn.amore { background: #e8f7f2; border-color: #1D9E75; color: #0F6E56; }
  .owner-btn.client { background: #e8f0fc; border-color: #5B8DD9; color: #2c5fb3; }

  .na-btn { font-size: 10px; padding: 2px 7px; border-radius: 10px; border: 1px solid #ddd; background: #fff; color: #aaa; cursor: pointer; flex-shrink: 0; margin-top: 4px; white-space: nowrap; transition: all 0.15s; }
  .na-btn:hover { background: #f5f0ea; border-color: #ccc; }
  .na-btn.active { background: #f0e8da; border-color: #C8975A; color: #8C6230; }

  /* Delete button — appears on hover of row */
  .del-btn { font-size: 13px; padding: 0 3px; background: none; border: none; color: #ddd; cursor: pointer; flex-shrink: 0; margin-top: 3px; line-height: 1; transition: color 0.15s; }
  .del-btn:hover { color: #e05555; }
  .item-row:not(:hover) .del-btn { opacity: 0; pointer-events: none; }

  .add-item { display: flex; gap: 6px; padding: 7px 14px; border-top: 1px solid #f0ede8; }
  .add-input { flex: 1; font-size: 12px; padding: 5px 9px; border: 1px solid #ddd; border-radius: 7px; background: #fafafa; color: #1a1a1a; outline: none; }
  .add-input:focus { border-color: #B07D3A; background: #fff; }
  .add-btn-el { font-size: 12px; padding: 5px 10px; border: 1px solid #ddd; border-radius: 7px; background: #fff; color: #666; cursor: pointer; }
  .add-btn-el:hover { background: #f0f0f0; }

  .footer-actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
  .footer-btn { font-size: 12px; padding: 7px 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #555; cursor: pointer; }
  .footer-btn:hover { background: #f5f3f0; }
  .footer-btn.primary { background: #B07D3A; color: #fff; border-color: #B07D3A; }
  .footer-btn.primary:hover { background: #8C6230; }

  @media print {
    body { background: #fff; padding: 1rem; }
    .footer-actions, .add-item, .lang-toggle, .filter-row, .na-btn, .del-btn { display: none !important; }
    .section-body.collapsed { display: block !important; }
    .item-row.hidden { display: none !important; }
    .section.empty-section { display: none !important; }
    .owner-btn { border: 1px solid #ddd !important; }
    .item-label { padding: 0; background: none !important; box-shadow: none !important; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <div class="top-bar-text">
      <h1 id="title-text">Monastery Wedding Checklist</h1>
      <p class="subtitle" id="subtitle-text">Myanmar Buddhist tradition — reusable master template</p>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-my" onclick="setLang('my')">မြန်မာ</button>
    </div>
  </div>

  <div class="event-meta">
    <div class="meta-field">
      <span class="meta-label" data-key="meta_couple">Couple</span>
      <input class="meta-input" placeholder="e.g. Ma Aye & Ko Kyaw" />
    </div>
    <div class="meta-field">
      <span class="meta-label" data-key="meta_date">Wedding Date</span>
      <input class="meta-input" type="date" />
    </div>
    <div class="meta-field">
      <span class="meta-label" data-key="meta_monastery">Monastery</span>
      <input class="meta-input" data-key-ph="ph_monastery" placeholder="Monastery name" />
    </div>
    <div class="meta-field">
      <span class="meta-label" data-key="meta_soon">Alms time (Mingalar Soon)</span>
      <input class="meta-input" data-key-ph="ph_soon" placeholder="e.g. 10:00 AM" />
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text"></div>
  </div>

  <div class="filter-row">
    <span class="filter-row-label" id="label-status">Status</span>
    <button class="filter-btn active" id="filter-all"     onclick="setFilter('status','all')"     data-key="filter_all">All</button>
    <button class="filter-btn"        id="filter-pending" onclick="setFilter('status','pending')" data-key="filter_pending">Pending</button>
    <button class="filter-btn"        id="filter-done"    onclick="setFilter('status','done')"    data-key="filter_done">Done</button>
    <button class="filter-btn"        id="filter-na"      onclick="setFilter('status','na')"      data-key="filter_na">N/A</button>
  </div>
  <div class="filter-row" style="margin-bottom:1rem;">
    <span class="filter-row-label" id="label-owner">Owner</span>
    <button class="filter-btn active" id="filter-owner-all"    onclick="setFilter('owner','all')"    data-key="filter_owner_all">All</button>
    <button class="filter-btn"        id="filter-owner-amore"  onclick="setFilter('owner','amore')"  data-key="filter_owner_amore">Amore</button>
    <button class="filter-btn"        id="filter-owner-client" onclick="setFilter('owner','client')" data-key="filter_owner_client">Client</button>
    <button class="filter-btn"        id="filter-owner-unset"  onclick="setFilter('owner','unset')"  data-key="filter_owner_unset">Unassigned</button>
  </div>

  <div id="sections"></div>

  <div class="footer-actions">
    <button class="footer-btn" onclick="expandAll()"  data-key="btn_expand">Expand all</button>
    <button class="footer-btn" onclick="collapseAll()" data-key="btn_collapse">Collapse all</button>
    <button class="footer-btn" onclick="uncheckAll()"  data-key="btn_reset">Reset all</button>
    <button class="footer-btn primary" onclick="window.print()" data-key="btn_print">Print / Save PDF</button>
  </div>
</div>

      { t: { en: "Guest sign book & pens set up",                    my: "ဧည့်သည် လက်မှတ်ထိုးစာအုပ်နှင့် ဘောပင် ပြင်ဆင်ပြီး" }, o: "amore" },
      { t: { en: "Gift / envelope collection table arranged",        my: "လက်ဆောင် / စာအိတ် လက်ခံစားပွဲ စီစဉ်ပြီး" }, o: "amore" },
    ]
  },
  { id: "helpers", icon: "◁",
    name: { en: "Helpers on the day", my: "နေ့တွင် ကူညီသူများ" },
    items: [
      { t: { en: "Greeter assigned at monastery entrance",       my: "ကျောင်းတိုက်ဝင်ပေါက်တွင် ကြိုဆိုသူ သတ်မှတ်ပြီး" }, o: "client" },
      { t: { en: "Gift & envelope collection person assigned",   my: "လက်ဆောင် / စာအိတ် လက်ခံသူ သတ်မှတ်ပြီး" }, o: "client" },
      { t: { en: "Food serving team briefed",                    my: "ဧည့်ခံ ဝန်ဆောင်မှုအဖွဲ့ ညှိနှိုင်းပြီး" }, o: "amore" },
      { t: { en: "Monk-offering serving team briefed",           my: "ဆွမ်းကပ်ဝန်ဆောင်မှုအဖွဲ့ ညှိနှိုင်းပြီး" }, o: "amore" },
    ]
  },
  { id: "photo_video", icon: "▣",
    name: { en: "Photo & video", my: "ဓာတ်ပုံနှင့် ဗီဒီယို" },
    items: [
      { t: { en: "Photographer confirmed & call time set",                               my: "ဓာတ်ပုံဆရာ အတည်ပြုပြီး၊ ရောက်ရမည့်အချိန် သတ်မှတ်ပြီး" }, o: "amore" },
      { t: { en: "Videographer confirmed & call time set",                               my: "ဗီဒီယိုဆရာ အတည်ပြုပြီး၊ ရောက်ရမည့်အချိန် သတ်မှတ်ပြီး" }, o: "amore" },
      { t: { en: "Key shots shared (Soon offering, garland exchange, family portraits)", my: "မှတ်တမ်းတင်ရမည့် အဓိကအခိုက်အတန့်များ မျှဝေပြီး" }, o: "amore" },
    ]
  },
  { id: "logistics", icon: "⚙",
    name: { en: "Day-of logistics", my: "နေ့ဆိုင်ရာ စီစဉ်မှုများ" },
    items: [
      { t: { en: "Transport for couple arranged",                   my: "သတို့တွဲ သယ်ယူပို့ဆောင်ရေး စီစဉ်ပြီး" }, o: "client" },
      { t: { en: "Arrival time at monastery confirmed",             my: "ကျောင်းတိုက် ရောက်ရမည့်အချိန် အတည်ပြုပြီး" }, o: "client" },
      { t: { en: "Monastery rules reviewed (decor, noise, access)", my: "ကျောင်းတိုက် စည်းကမ်းများ သိရှိပြီး (အလှဆင်ခြင်း၊ ဆူညံမှု)" }, o: "client" },
      { t: { en: "Monastery premises left clean after event",       my: "အခမ်းအနားပြီးနောက် ကျောင်းတိုက် သန့်ရှင်းရေး ပြုလုပ်ပြီး" }, o: "client" },
    ]
  },
];

let currentLang = 'en';
let statusFilter = 'all';
let ownerFilter = 'all';

// Per-item mutable state (indexed by section id + item index)
let checkedState = {};  // bool
let naState = {};       // bool
let ownerState = {};    // 'amore' | 'client' | null
let labelState = {};    // { en: string, my: string }
let collapsed = {};
let customItems = {};   // array of { en, my, o }

SECTIONS_DATA.forEach(s => {
  checkedState[s.id] = s.items.map(() => false);
  naState[s.id]      = s.items.map(() => false);
  ownerState[s.id]   = s.items.map(item => item.o || null);
  labelState[s.id]   = s.items.map(item => ({ en: item.t.en, my: item.t.my }));
  collapsed[s.id]    = false;
  customItems[s.id]  = [];
});

function totalItems(secId) {
  return labelState[secId].length + customItems[secId].length;
}

function getLabel(secId, i) {
  const total = labelState[secId].length;
  if (i < total) return labelState[secId][i][currentLang] || labelState[secId][i].en;
  const ci = i - total;
  return customItems[secId][ci][currentLang] || customItems[secId][ci].en;
}

function setLabelBothLangs(secId, i, text) {
  // Save to current lang; other lang keeps its value
  const total = labelState[secId].length;
  if (i < total) {
    labelState[secId][i][currentLang] = text;
  } else {
    const ci = i - total;
    customItems[secId][ci][currentLang] = text;
  }
}

function setFilter(type, val) {
  if (type === 'status') {
    statusFilter = val;
    ['all','pending','done','na'].forEach(x => {
      document.getElementById('filter-' + x).className = 'filter-btn' + (x === val ? ' active' : '');
    });
  } else {
    ownerFilter = val;
    ['all','amore','client','unset'].forEach(x => {
      const el = document.getElementById('filter-owner-' + x);
      let cls = 'filter-btn';
      if (x === val) cls += x === 'amore' ? ' active-amore' : x === 'client' ? ' active-client' : ' active';
      el.className = cls;
    });
  }
  applyFilter();
}

function itemVisible(secId, i) {
  const isChecked = checkedState[secId][i], isNA = naState[secId][i], owner = ownerState[secId][i];
  const statusOk = statusFilter === 'all' ||
    (statusFilter === 'pending' && !isChecked && !isNA) ||
    (statusFilter === 'done'    &&  isChecked && !isNA) ||
    (statusFilter === 'na'      && isNA);
  const ownerOk = ownerFilter === 'all' ||
    (ownerFilter === 'amore'  && owner === 'amore') ||
    (ownerFilter === 'client' && owner === 'client') ||
    (ownerFilter === 'unset'  && !owner);
  return statusOk && ownerOk;
}

function applyFilter() {
  document.querySelectorAll('.section').forEach(secEl => {
    const secId = secEl.getAttribute('data-id');
    let visible = 0;
    secEl.querySelectorAll('.item-row[data-idx]').forEach(row => {
      const show = itemVisible(secId, parseInt(row.getAttribute('data-idx')));
      row.classList.toggle('hidden', !show);
      if (show) visible++;
    });
    const addRow = secEl.querySelector('.add-item');
    if (addRow) addRow.style.display = (statusFilter === 'all' && ownerFilter === 'all') ? '' : 'none';
    secEl.classList.toggle('empty-section', visible === 0);
  });
}

function updateProgress() {
  let total = 0, checked = 0, na = 0;
  SECTIONS_DATA.forEach(s => {
    checkedState[s.id].forEach((v, i) => {
      if (naState[s.id][i]) { na++; return; }
      total++; if (v) checked++;
    });
  });
  const pct = total ? Math.round(checked / total * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").textContent = LANG[currentLang].progress(checked, total, na);
}

function refreshCount(secId) {
  const n = totalItems(secId);
  const nc = naState[secId].filter(Boolean).length;
  const cc = checkedState[secId].filter((v, i) => v && !naState[secId][i]).length;
  const el = document.getElementById('count-' + secId);
  if (el) el.innerHTML = `${cc}/${n - nc}${nc ? ` <span style="color:#C8975A;font-size:11px">· ${nc} N/A</span>` : ''}`;
}

function cycleOwner(secId, i) {
  const cur = ownerState[secId][i];
  ownerState[secId][i] = cur === null ? 'amore' : cur === 'amore' ? 'client' : null;
  const btn = document.querySelector(`.owner-btn[data-sec="${secId}"][data-idx="${i}"]`);
  if (btn) {
    const o = ownerState[secId][i], L = LANG[currentLang];
    btn.className = 'owner-btn' + (o === 'amore' ? ' amore' : o === 'client' ? ' client' : '');
    btn.textContent = o === 'amore' ? L.amore_label : o === 'client' ? L.client_label : '—';
  }
  applyFilter();
}

function deleteItem(secId, i) {
  checkedState[secId].splice(i, 1);
  naState[secId].splice(i, 1);
  ownerState[secId].splice(i, 1);
  const total = labelState[secId].length;
  if (i < total) {
    labelState[secId].splice(i, 1);
    // also remove from SECTIONS_DATA
    const sec = SECTIONS_DATA.find(s => s.id === secId);
    if (sec) sec.items.splice(i, 1);
  } else {
    customItems[secId].splice(i - total, 1);
  }
  renderSections();
  updateProgress();
}

function renderSections() {
  const container = document.getElementById("sections");
  container.innerHTML = "";
  const L = LANG[currentLang];

  SECTIONS_DATA.forEach(sec => {
    const n = totalItems(sec.id);
    const nc = naState[sec.id].filter(Boolean).length;
    const cc = checkedState[sec.id].filter((v, i) => v && !naState[sec.id][i]).length;

    const div = document.createElement("div");
    div.className = "section";
    div.setAttribute('data-id', sec.id);

    const header = document.createElement("div");
    header.className = "section-header";
    header.innerHTML = `
      <span class="section-icon">${sec.icon}</span>
      <span class="section-name">${sec.name[currentLang] || sec.name.en}</span>
      <span class="section-count" id="count-${sec.id}">${cc}/${n - nc}${nc ? ` <span style="color:#C8975A;font-size:11px">· ${nc} N/A</span>` : ''}</span>
      <span class="section-toggle">${collapsed[sec.id] ? "▸" : "▾"}</span>
    `;
    header.onclick = () => { collapsed[sec.id] = !collapsed[sec.id]; renderSections(); };

    const body = document.createElement("div");
    body.className = "section-body" + (collapsed[sec.id] ? " collapsed" : "");

    for (let i = 0; i < n; i++) {
      const label = getLabel(sec.id, i);
      const isChecked = checkedState[sec.id][i];
      const isNA = naState[sec.id][i];
      const owner = ownerState[sec.id][i];

      const row = document.createElement("div");
      row.className = "item-row";
      row.setAttribute('data-idx', i);

      const cbId = `cb-${sec.id}-${i}`;
      const labelClass = "item-label" + (isNA ? " na" : isChecked ? " checked" : "");
      const ownerClass = 'owner-btn' + (owner === 'amore' ? ' amore' : owner === 'client' ? ' client' : '');
      const ownerText = owner === 'amore' ? L.amore_label : owner === 'client' ? L.client_label : '—';

      // checkbox
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.id = cbId;
      cb.checked = isChecked && !isNA;
      cb.disabled = isNA;
      cb.onchange = function() {
        checkedState[sec.id][i] = this.checked;
        lbl.className = 'item-label' + (this.checked ? ' checked' : '');
        refreshCount(sec.id);
        updateProgress();
        applyFilter();
      };

      // editable label
      const lbl = document.createElement("label");
      lbl.className = labelClass;
      lbl.setAttribute("for", cbId);
      lbl.setAttribute("contenteditable", "true");
      lbl.setAttribute("data-placeholder", L.edit_placeholder);
      lbl.setAttribute("spellcheck", "false");
      lbl.textContent = label;
      lbl.oninput = function() {
        setLabelBothLangs(sec.id, i, this.textContent.trim());
      };
      // prevent checkbox toggle when editing
      lbl.onkeydown = function(e) {
        if (e.key === "Enter") { e.preventDefault(); this.blur(); }
      };
      lbl.onclick = function(e) { e.preventDefault(); this.focus(); };

      // owner button
      const ownerBtn = document.createElement("button");
      ownerBtn.className = ownerClass;
      ownerBtn.setAttribute("data-sec", sec.id);
      ownerBtn.setAttribute("data-idx", i);
      ownerBtn.textContent = ownerText;
      ownerBtn.onclick = e => { e.stopPropagation(); cycleOwner(sec.id, i); };

      // N/A button
      const naBtn = document.createElement("button");
      naBtn.className = "na-btn" + (isNA ? " active" : "");
      naBtn.textContent = L.na_label;
      naBtn.onclick = () => {
        naState[sec.id][i] = !naState[sec.id][i];
        if (naState[sec.id][i]) checkedState[sec.id][i] = false;
        renderSections(); updateProgress();
      };

      // delete button
      const delBtn = document.createElement("button");
      delBtn.className = "del-btn";
      delBtn.textContent = "×";
      delBtn.title = "Remove item";
      delBtn.onclick = e => { e.stopPropagation(); deleteItem(sec.id, i); };

      row.appendChild(cb);
      row.appendChild(lbl);
      row.appendChild(ownerBtn);
      row.appendChild(naBtn);
      row.appendChild(delBtn);
      body.appendChild(row);
    }

    // Add row
    const addRow = document.createElement("div");
    addRow.className = "add-item";
    addRow.innerHTML = `<input class="add-input" placeholder="${L.add_placeholder}" /><button class="add-btn-el">${L.add_btn}</button>`;
    const inp = addRow.querySelector("input"), btn = addRow.querySelector("button");
    const doAdd = () => {
      const v = inp.value.trim(); if (!v) return;
      const newItem = { en: v, my: v };
      customItems[sec.id].push(newItem);
      checkedState[sec.id].push(false);
      naState[sec.id].push(false);
      ownerState[sec.id].push(null);
      inp.value = "";
      renderSections(); updateProgress();
    };
    btn.onclick = doAdd;
    inp.onkeydown = e => { if (e.key === "Enter") doAdd(); };
    body.appendChild(addRow);

    div.appendChild(header);
    div.appendChild(body);
    container.appendChild(div);
  });

  updateProgress();
  applyFilter();
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-my').classList.toggle('active', lang === 'my');
  const L = LANG[lang];
  document.getElementById('title-text').textContent = L.title;
  document.getElementById('subtitle-text').textContent = L.subtitle;
  document.getElementById('label-status').textContent = L.label_status;
  document.getElementById('label-owner').textContent = L.label_owner;
  document.querySelectorAll('[data-key]').forEach(el => { const k = el.getAttribute('data-key'); if (L[k] !== undefined) el.textContent = L[k]; });
  document.querySelectorAll('[data-key-ph]').forEach(el => { const k = el.getAttribute('data-key-ph'); if (L[k]) el.placeholder = L[k]; });
  renderSections();
}

function expandAll()  { SECTIONS_DATA.forEach(s => collapsed[s.id] = false); renderSections(); }
function collapseAll(){ SECTIONS_DATA.forEach(s => collapsed[s.id] = true);  renderSections(); }
function uncheckAll() {
  SECTIONS_DATA.forEach(s => {
    checkedState[s.id] = checkedState[s.id].map(() => false);
    naState[s.id]      = naState[s.id].map(() => false);
  });
  renderSections();
}

renderSections();
</script>
</body>
</html>
