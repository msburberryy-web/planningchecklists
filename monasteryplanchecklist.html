<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monastery Wedding Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f5f2; color: #1a1a1a; padding: 2rem 1rem; }
  .app { max-width: 680px; margin: 0 auto; }

  .top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 12px; }
  .top-bar-text h1 { font-size: 19px; font-weight: 600; margin-bottom: 3px; }
  .top-bar-text .subtitle { font-size: 12px; color: #999; }
  .lang-toggle { display: flex; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .lang-btn { font-size: 12px; padding: 6px 13px; background: #fff; color: #888; cursor: pointer; border: none; outline: none; transition: background 0.15s, color 0.15s; }
  .lang-btn.active { background: #B07D3A; color: #fff; }

  .event-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; }
  .meta-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  .meta-input { font-size: 13px; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
  .meta-input:focus { border-color: #B07D3A; }

  .progress-wrap { margin-bottom: 1.25rem; }
  .progress-bar { height: 4px; background: #e5e5e5; border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
  .progress-fill { height: 100%; border-radius: 99px; background: #B07D3A; transition: width 0.3s ease; }
  .progress-text { font-size: 12px; color: #999; }

  /* Filter rows */
  .filter-row { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
  .filter-row-label { font-size: 11px; color: #bbb; text-transform: uppercase; letter-spacing: 0.05em; min-width: 44px; }
  .filter-btn { font-size: 12px; padding: 5px 13px; border: 1px solid #ddd; border-radius: 20px; background: #fff; color: #666; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { background: #f5f3f0; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .filter-btn.active-amore { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .filter-btn.active-client { background: #5B8DD9; color: #fff; border-color: #5B8DD9; }
  .filter-divider { height: 1px; background: #ede9e3; margin-bottom: 1rem; }

  .section { margin-bottom: 8px; border: 1px solid #e8e5e0; border-radius: 12px; overflow: hidden; background: #fff; }
  .section.empty-section { display: none; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #faf8f5; cursor: pointer; user-select: none; }
  .section-icon { font-size: 14px; width: 20px; text-align: center; }
  .section-name { font-size: 13px; font-weight: 600; color: #1a1a1a; flex: 1; }
  .section-count { font-size: 12px; color: #bbb; }
  .section-toggle { font-size: 10px; color: #ccc; }
  .section-body.collapsed { display: none; }

  .item-row { display: flex; align-items: flex-start; gap: 8px; padding: 7px 14px; border-bottom: 1px solid #f2ede8; }
  .item-row:last-of-type { border-bottom: none; }
  .item-row.hidden { display: none; }

  .item-row input[type=checkbox] { width: 14px; height: 14px; accent-color: #B07D3A; cursor: pointer; flex-shrink: 0; margin-top: 3px; }
  .item-label { font-size: 13px; color: #1a1a1a; flex: 1; line-height: 1.6; cursor: pointer; }
  .item-label.checked { color: #c0bbb4; text-decoration: line-through; }
  .item-label.na { color: #c8c0b8; text-decoration: line-through; font-style: italic; }

  /* Owner tag pill */
  .owner-btn {
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 10px; border: 1px solid #ddd;
    cursor: pointer; flex-shrink: 0; margin-top: 3px;
    transition: all 0.15s; white-space: nowrap; background: #fff; color: #bbb;
    letter-spacing: 0.02em;
  }
  .owner-btn.amore { background: #e8f7f2; border-color: #1D9E75; color: #0F6E56; }
  .owner-btn.client { background: #e8f0fc; border-color: #5B8DD9; color: #2c5fb3; }

  /* N/A button */
  .na-btn { font-size: 10px; padding: 2px 7px; border-radius: 10px; border: 1px solid #ddd; background: #fff; color: #aaa; cursor: pointer; flex-shrink: 0; margin-top: 3px; white-space: nowrap; transition: all 0.15s; }
  .na-btn:hover { background: #f5f0ea; border-color: #ccc; }
  .na-btn.active { background: #f0e8da; border-color: #C8975A; color: #8C6230; }

  .add-item { display: flex; gap: 6px; padding: 7px 14px; border-top: 1px solid #f0ede8; }
  .add-input { flex: 1; font-size: 12px; padding: 5px 9px; border: 1px solid #ddd; border-radius: 7px; background: #fafafa; color: #1a1a1a; outline: none; }
  .add-input:focus { border-color: #B07D3A; background: #fff; }
  .add-btn-el { font-size: 12px; padding: 5px 10px; border: 1px solid #ddd; border-radius: 7px; background: #fff; color: #666; cursor: pointer; }
  .add-btn-el:hover { background: #f0f0f0; }

  .footer-actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
  .footer-btn { font-size: 12px; padding: 7px 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #555; cursor: pointer; }
  .footer-btn:hover { background: #f5f3f0; }
  .footer-btn.primary { background: #B07D3A; color: #fff; border-color: #B07D3A; }
  .footer-btn.primary:hover { background: #8C6230; }

  @media print {
    body { background: #fff; padding: 1rem; }
    .footer-actions, .add-item, .lang-toggle, .filter-row, .filter-divider, .na-btn { display: none !important; }
    .section-body.collapsed { display: block !important; }
    .item-row.hidden { display: none !important; }
    .section.empty-section { display: none !important; }
    .owner-btn { border: 1px solid #ddd !important; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <div class="top-bar-text">
      <h1 id="title-text">Monastery Wedding Checklist</h1>
      <p class="subtitle" id="subtitle-text">Myanmar Buddhist tradition — reusable master template</p>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-my" onclick="setLang('my')">မြန်မာ</button>
    </div>
  </div>

  <div class="event-meta">
    <div class="meta-field">
      <span class="meta-label" data-key="meta_couple">Couple</span>
      <input class="meta-input" placeholder="e.g. Ma Aye & Ko Kyaw" />
    </div>
    <div class="meta-field">
      <span class="meta-label" data-key="meta_date">Wedding Date</span>
      <input class="meta-input" type="date" />
    </div>
    <div class="meta-field">
      <span class="meta-label" data-key="meta_monastery">Monastery</span>
      <input class="meta-input" data-key-ph="ph_monastery" placeholder="Monastery name" />
    </div>
    <div class="meta-field">
      <span class="meta-label" data-key="meta_soon">Alms time (Mingalar Soon)</span>
      <input class="meta-input" data-key-ph="ph_soon" placeholder="e.g. 10:00 AM" />
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text"></div>
  </div>

  <!-- Status filter -->
  <div class="filter-row">
    <span class="filter-row-label" id="label-status">Status</span>
    <button class="filter-btn active" id="filter-all" onclick="setFilter('status','all')" data-key="filter_all">All</button>
    <button class="filter-btn" id="filter-pending" onclick="setFilter('status','pending')" data-key="filter_pending">Pending</button>
    <button class="filter-btn" id="filter-done" onclick="setFilter('status','done')" data-key="filter_done">Done</button>
    <button class="filter-btn" id="filter-na" onclick="setFilter('status','na')" data-key="filter_na">N/A</button>
  </div>
  <!-- Owner filter -->
  <div class="filter-row" style="margin-bottom:1rem;">
    <span class="filter-row-label" id="label-owner">Owner</span>
    <button class="filter-btn active" id="filter-owner-all" onclick="setFilter('owner','all')" data-key="filter_owner_all">All</button>
    <button class="filter-btn" id="filter-owner-amore" onclick="setFilter('owner','amore')" data-key="filter_owner_amore">Amore</button>
    <button class="filter-btn" id="filter-owner-client" onclick="setFilter('owner','client')" data-key="filter_owner_client">Client</button>
    <button class="filter-btn" id="filter-owner-unset" onclick="setFilter('owner','unset')" data-key="filter_owner_unset">Unassigned</button>
  </div>

  <div id="sections"></div>

  <div class="footer-actions">
    <button class="footer-btn" onclick="expandAll()" data-key="btn_expand">Expand all</button>
    <button class="footer-btn" onclick="collapseAll()" data-key="btn_collapse">Collapse all</button>
    <button class="footer-btn" onclick="uncheckAll()" data-key="btn_reset">Reset all</button>
    <button class="footer-btn primary" onclick="window.print()" data-key="btn_print">Print / Save PDF</button>
  </div>
</div>

        { t: "ကျောင်းတိုက်ဝင်ပေါက်တွင် ကြိုဆိုသူ သတ်မှတ်ပြီး", o: "amore" },
        { t: "လက်ဆောင် / စာအိတ် လက်ခံသူ သတ်မှတ်ပြီး", o: "amore" },
        { t: "ဧည့်ခံ ဝန်ဆောင်မှုအဖွဲ့ ညှိနှိုင်းပြီး", o: "amore" },
        { t: "ဆွမ်းကပ်ဝန်ဆောင်မှုအဖွဲ့ ညှိနှိုင်းပြီး", o: "amore" },
      ]
    },
    { id: "photo_video", icon: "▣", name: "ဓာတ်ပုံ / ဗီဒီယို",
      items: [
        { t: "ဓာတ်ပုံဆရာ အတည်ပြုပြီး၊ ရောက်ရမည့်အချိန် သတ်မှတ်ပြီး", o: "amore" },
        { t: "ဗီဒီယိုဆရာ အတည်ပြုပြီး၊ ရောက်ရမည့်အချိန် သတ်မှတ်ပြီး", o: "amore" },
        { t: "မှတ်တမ်းတင်ရမည့် အဓိကအခိုက်အတန့်များ မျှဝေပြီး", o: "amore" },
      ]
    },
    { id: "logistics", icon: "⚙", name: "နေ့ဆိုင်ရာ စီစဉ်မှုများ",
      items: [
        { t: "သတို့တွဲ သယ်ယူပို့ဆောင်ရေး စီစဉ်ပြီး", o: "client" },
        { t: "ကျောင်းတိုက် ရောက်ရမည့်အချိန် အတည်ပြုပြီး", o: "client" },
        { t: "ကျောင်းတိုက် စည်းကမ်းများ သိရှိပြီး (အလှဆင်ခြင်း၊ ဆူညံမှု)", o: "amore" },
        { t: "အခမ်းအနားပြီးနောက် ကျောင်းတိုက် သန့်ရှင်းရေး ပြုလုပ်ပြီး", o: "amore" },
      ]
    },
  ]
};

let currentLang = 'en';
let statusFilter = 'all';
let ownerFilter = 'all';
let state = {};
let naState = {};
let ownerState = {}; // per item: 'amore' | 'client' | null
let collapsed = {};
let customItems = {};

SECTIONS.en.forEach(s => {
  state[s.id] = s.items.map(() => false);
  naState[s.id] = s.items.map(() => false);
  ownerState[s.id] = s.items.map(item => item.o || null);
  collapsed[s.id] = false;
  customItems[s.id] = [];
});

function allItems(sec) {
  return [...sec.items, ...customItems[sec.id]];
}

function setFilter(type, val) {
  if (type === 'status') {
    statusFilter = val;
    ['all','pending','done','na'].forEach(x => {
      const el = document.getElementById('filter-' + x);
      el.className = 'filter-btn' + (x === val ? ' active' : '');
    });
  } else {
    ownerFilter = val;
    ['all','amore','client','unset'].forEach(x => {
      const el = document.getElementById('filter-owner-' + x);
      let cls = 'filter-btn';
      if (x === val) {
        if (x === 'amore') cls += ' active-amore';
        else if (x === 'client') cls += ' active-client';
        else cls += ' active';
      }
      el.className = cls;
    });
  }
  applyFilter();
}

function itemVisible(secId, i) {
  const isChecked = state[secId][i];
  const isNA = naState[secId][i];
  const owner = ownerState[secId][i];

  let statusOk = false;
  if (statusFilter === 'all') statusOk = true;
  else if (statusFilter === 'pending') statusOk = !isChecked && !isNA;
  else if (statusFilter === 'done') statusOk = isChecked && !isNA;
  else if (statusFilter === 'na') statusOk = isNA;

  let ownerOk = false;
  if (ownerFilter === 'all') ownerOk = true;
  else if (ownerFilter === 'amore') ownerOk = owner === 'amore';
  else if (ownerFilter === 'client') ownerOk = owner === 'client';
  else if (ownerFilter === 'unset') ownerOk = !owner;

  return statusOk && ownerOk;
}

function applyFilter() {
  document.querySelectorAll('.section').forEach(secEl => {
    const secId = secEl.getAttribute('data-id');
    const rows = secEl.querySelectorAll('.item-row[data-idx]');
    let visible = 0;
    rows.forEach(row => {
      const i = parseInt(row.getAttribute('data-idx'));
      const show = itemVisible(secId, i);
      row.classList.toggle('hidden', !show);
      if (show) visible++;
    });
    const addRow = secEl.querySelector('.add-item');
    if (addRow) addRow.style.display = (statusFilter === 'all' && ownerFilter === 'all') ? '' : 'none';
    secEl.classList.toggle('empty-section', visible === 0);
  });
}

function updateProgress() {
  let total = 0, checked = 0, na = 0;
  SECTIONS.en.forEach(s => {
    state[s.id].forEach((v, i) => {
      if (naState[s.id][i]) { na++; return; }
      total++;
      if (v) checked++;
    });
  });
  const pct = total ? Math.round(checked / total * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").textContent = LANG[currentLang].progress(checked, total, na);
}

function cycleOwner(secId, i) {
  const cur = ownerState[secId][i];
  ownerState[secId][i] = cur === null ? 'amore' : cur === 'amore' ? 'client' : null;
  // update button in place
  const btn = document.querySelector(`.owner-btn[data-sec="${secId}"][data-idx="${i}"]`);
  if (btn) {
    const L = LANG[currentLang];
    const o = ownerState[secId][i];
    btn.className = 'owner-btn' + (o === 'amore' ? ' amore' : o === 'client' ? ' client' : '');
    btn.textContent = o === 'amore' ? L.amore_label : o === 'client' ? L.client_label : '—';
    btn.title = o ? '' : 'Click to assign owner';
  }
  applyFilter();
}

function renderSections() {
  const container = document.getElementById("sections");
  container.innerHTML = "";
  const L = LANG[currentLang];
  const sections = SECTIONS[currentLang];

  sections.forEach(sec => {
    const items = allItems(sec);
    const checkedCount = state[sec.id].filter((v, i) => v && !naState[sec.id][i]).length;
    const naCount = naState[sec.id].filter(Boolean).length;
    const activeTotal = items.length - naCount;

    const div = document.createElement("div");
    div.className = "section";
    div.setAttribute('data-id', sec.id);

    const header = document.createElement("div");
    header.className = "section-header";
    header.innerHTML = `
      <span class="section-icon">${sec.icon}</span>
      <span class="section-name">${sec.name}</span>
      <span class="section-count" id="count-${sec.id}">${checkedCount}/${activeTotal}${naCount ? ` <span style="color:#C8975A;font-size:11px">· ${naCount} N/A</span>` : ''}</span>
      <span class="section-toggle">${collapsed[sec.id] ? "▸" : "▾"}</span>
    `;
    header.onclick = () => { collapsed[sec.id] = !collapsed[sec.id]; renderSections(); };

    const body = document.createElement("div");
    body.className = "section-body" + (collapsed[sec.id] ? " collapsed" : "");

    items.forEach((item, i) => {
      const label = typeof item === 'string' ? item : item.t;
      const row = document.createElement("div");
      row.className = "item-row";
      row.setAttribute('data-idx', i);
      const cbId = `cb-${sec.id}-${i}`;
      const isChecked = state[sec.id][i];
      const isNA = naState[sec.id][i];
      const owner = ownerState[sec.id][i];

      let labelClass = "item-label";
      if (isNA) labelClass += " na";
      else if (isChecked) labelClass += " checked";

      const ownerClass = 'owner-btn' + (owner === 'amore' ? ' amore' : owner === 'client' ? ' client' : '');
      const ownerText = owner === 'amore' ? L.amore_label : owner === 'client' ? L.client_label : '—';
      const ownerTitle = owner ? '' : 'Click to assign owner';

      row.innerHTML = `
        <input type="checkbox" id="${cbId}" ${isChecked && !isNA ? "checked" : ""} ${isNA ? "disabled" : ""} />
        <label class="${labelClass}" for="${cbId}">${label}</label>
        <button class="${ownerClass}" data-sec="${sec.id}" data-idx="${i}" title="${ownerTitle}">${ownerText}</button>
        <button class="na-btn${isNA ? ' active' : ''}" data-na-sec="${sec.id}" data-na-idx="${i}">${L.na_label}</button>
      `;

      row.querySelector("input").onchange = function() {
        if (naState[sec.id][i]) return;
        state[sec.id][i] = this.checked;
        const lbl = row.querySelector('.item-label');
        lbl.className = 'item-label' + (this.checked ? ' checked' : '');
        const naCount2 = naState[sec.id].filter(Boolean).length;
        const cc = state[sec.id].filter((v, j) => v && !naState[sec.id][j]).length;
        const el = document.getElementById('count-' + sec.id);
        if (el) el.innerHTML = `${cc}/${items.length - naCount2}${naCount2 ? ` <span style="color:#C8975A;font-size:11px">· ${naCount2} N/A</span>` : ''}`;
        updateProgress();
        applyFilter();
      };

      row.querySelector('.owner-btn').onclick = function(e) {
        e.stopPropagation();
        cycleOwner(sec.id, i);
      };

      row.querySelector('.na-btn').onclick = function() {
        naState[sec.id][i] = !naState[sec.id][i];
        if (naState[sec.id][i]) state[sec.id][i] = false;
        renderSections();
        updateProgress();
      };

      body.appendChild(row);
    });

    const addRow = document.createElement("div");
    addRow.className = "add-item";
    addRow.innerHTML = `<input class="add-input" placeholder="${L.add_placeholder}" /><button class="add-btn-el">${L.add_btn}</button>`;
    const inp = addRow.querySelector("input");
    const btn = addRow.querySelector("button");
    const doAdd = () => {
      const v = inp.value.trim();
      if (!v) return;
      customItems[sec.id].push({ t: v, o: null });
      state[sec.id].push(false);
      naState[sec.id].push(false);
      ownerState[sec.id].push(null);
      inp.value = "";
      renderSections();
      updateProgress();
    };
    btn.onclick = doAdd;
    inp.onkeydown = e => { if (e.key === "Enter") doAdd(); };
    body.appendChild(addRow);

    div.appendChild(header);
    div.appendChild(body);
    container.appendChild(div);
  });

  updateProgress();
  applyFilter();
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-my').classList.toggle('active', lang === 'my');
  const L = LANG[lang];
  document.getElementById('title-text').textContent = L.title;
  document.getElementById('subtitle-text').textContent = L.subtitle;
  document.getElementById('label-status').textContent = L.label_status;
  document.getElementById('label-owner').textContent = L.label_owner;
  document.querySelectorAll('[data-key]').forEach(el => {
    const k = el.getAttribute('data-key');
    if (L[k] !== undefined) el.textContent = L[k];
  });
  document.querySelectorAll('[data-key-ph]').forEach(el => {
    const k = el.getAttribute('data-key-ph');
    if (L[k]) el.placeholder = L[k];
  });
  renderSections();
}

function expandAll() { SECTIONS.en.forEach(s => collapsed[s.id] = false); renderSections(); }
function collapseAll() { SECTIONS.en.forEach(s => collapsed[s.id] = true); renderSections(); }
function uncheckAll() {
  SECTIONS.en.forEach(s => {
    state[s.id] = state[s.id].map(() => false);
    naState[s.id] = naState[s.id].map(() => false);
  });
  renderSections();
}

renderSections();
</script>
</body>
</html>
